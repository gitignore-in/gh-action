name: gitignore-in
author: Yui KITSU
description: |
  Run gitignore-in command and if .gitignore is updated, generate pull request.
branding:
  icon: file-minus
  color: white

inputs:
  branch_name:
    description: |
      Branch name to create pull request.
      Default: gitignore-in
    required: false
    default: gitignore-in
  base_branch:
    description: |
      Base branch name to create pull request.
      Default: main
    required: false
    default: main
  commit_message:
    description: |
      Commit message for the .gitignore update.
      Default: Update .gitignore by gitignore.in
    required: false
    default: Update .gitignore by gitignore.in
  pr_title:
    description: |
      Pull request title.
      Default: Update .gitignore
    required: false
    default: Update .gitignore
  pr_body:
    description: |
      Pull request body.
      Default: Update .gitignore by gitignore.in
    required: false
    default: Update .gitignore by gitignore.in
  delete_branch:
    description: |
      Whether to delete the branch after the pull request is merged.
      Default: true
    required: false
    default: "true"
  boilerplates_ref:
    description: |
      Optional git ref (branch, tag, or full SHA) for the gitignore boilerplates
      database (github.com/toptal/gitignore). When set, the boilerplates database
      is checked out at this ref after the update, making .gitignore generation
      reproducible across runs and recording that pinned commit SHA in generated
      pull request bodies. Leave empty to use the latest commit (default
      behaviour, non-deterministic); the action warns when this input is omitted.
    required: false
    default: ""
outputs:
  pull-request-number:
    description: Pull request number.
    value: ${{ steps.create_pull_request.outputs.pull-request-number }}
  pull-request-url:
    description: Pull request URL.
    value: ${{ steps.create_pull_request.outputs.pull-request-url }}
  pull-request-operation:
    description: |
      The pull request operation performed by the action, `created`, `updated` or `closed`.
    value: ${{ steps.create_pull_request.outputs.pull-request-operation }}
  pull-request-head-sha:
    description: |
      The SHA of the head commit of the pull request.
    value: ${{ steps.create_pull_request.outputs.pull-request-head-sha }}
  boilerplates-ref:
    description: |
      The git commit SHA of the gitignore boilerplates database
      (github.com/toptal/gitignore) used when generating .gitignore.
      Empty string if the boilerplates directory was not available.
    value: ${{ steps.boilerplates_ref.outputs.boilerplates-ref }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.base_branch }}
        path: repository

    - uses: gitignore-in/install-gibo@9e7dba9e59f184b41f542669b0864687a6f69b45 # v0.1.0
      with:
        boilerplates-ref: ${{ inputs.boilerplates_ref }}
    - name: warn when boilerplates_ref is not set
      if: inputs.boilerplates_ref == ''
      run: |
        echo "::warning::boilerplates_ref is not set; generated pull requests will record the latest boilerplates database commit SHA, but the generated .gitignore may vary between runs."
      shell: bash
    - run: |
        set -euo pipefail
        tmpdir=$(mktemp -d)
        trap 'rm -rf "${tmpdir}"' EXIT
        cd "${tmpdir}"
        version=v0.2.1
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            target="gitignore-in-x86_64-unknown-linux-gnu-${version}.tar.gz"
            ;;
          Linux-ARM64)
            target="gitignore-in-aarch64-unknown-linux-gnu-${version}.tar.gz"
            ;;
          macOS-X64)
            target="gitignore-in-x86_64-apple-darwin-${version}.tar.gz"
            ;;
          macOS-ARM64)
            target="gitignore-in-aarch64-apple-darwin-${version}.tar.gz"
            ;;
          *)
            echo "Unsupported runner platform: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac
        url="https://github.com/gitignore-in/gitignore-in/releases/download/${version}/${target}"
        echo "Downloading ${url} (${RUNNER_OS}-${RUNNER_ARCH})" >&2
        wget --tries=3 --timeout=60 "${url}"
        grep -F "  ${target}" "${GITHUB_ACTION_PATH}/bundled-binary.sha256" > "${target}.sha256"
        shasum -a 256 -c "${target}.sha256"
        tar -xzf "${target}"
        mkdir -p "${RUNNER_TEMP}/gitignore-in/bin"
        install -m 0755 gitignore.in "${tmpdir}/gitignore.in.installed"
        mv "${tmpdir}/gitignore.in.installed" "${RUNNER_TEMP}/gitignore-in/bin/gitignore.in"
        echo "${RUNNER_TEMP}/gitignore-in/bin" >> "${GITHUB_PATH}"
      shell: bash

    - name: run gitignore.in
      run: |
        "${GITHUB_ACTION_PATH}/scripts/run-with-timeout.sh" 300 gitignore.in
      shell: bash
      working-directory: repository

    - name: capture boilerplates ref
      id: boilerplates_ref
      run: |
        boilerplates_dir="${HOME}/.gitignore-boilerplates"
        if [ -d "${boilerplates_dir}/.git" ]; then
          ref=$(git -C "${boilerplates_dir}" rev-parse --verify HEAD)
        else
          ref=""
        fi
        echo "boilerplates-ref=${ref}" >> "${GITHUB_OUTPUT}"
      shell: bash

    - name: compose pull request body
      id: pr_body
      env:
        INPUT_PR_BODY: ${{ inputs.pr_body }}
        BOILERPLATES_REF: ${{ steps.boilerplates_ref.outputs.boilerplates-ref }}
      run: |
        body_file="${RUNNER_TEMP}/gitignore-in-pr-body.md"
        {
          if [ -n "${INPUT_PR_BODY}" ]; then
            printf '%s\n\n' "${INPUT_PR_BODY}"
          fi
          if [ -n "${BOILERPLATES_REF}" ]; then
            printf 'Boilerplates database commit SHA: %s\n' "${BOILERPLATES_REF}"
          else
            printf 'Boilerplates database commit SHA: unavailable\n'
          fi
        } >"${body_file}"
        echo "body-path=${body_file}" >> "${GITHUB_OUTPUT}"
      shell: bash

    - name: check .gitignore
      id: check
      run: |
        "${GITHUB_ACTION_PATH}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
      shell: bash
      working-directory: repository

    - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      if: steps.check.outputs.changed == 'true'
      id: create_pull_request
      with:
        branch: ${{ inputs.branch_name }}
        base: ${{ inputs.base_branch }}
        path: repository
        commit-message: ${{ inputs.commit_message }}
        delete-branch: ${{ inputs.delete_branch }}
        title: ${{ inputs.pr_title }}
        body-path: ${{ steps.pr_body.outputs.body-path }}
      env:
        GH_TOKEN: ${{ github.token }}
