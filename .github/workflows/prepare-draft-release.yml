name: prepare draft release

on:
  push:
    branches: [main]
    paths:
      - action.yml
  workflow_dispatch:
    inputs:
      version:
        description: Action release version tag (for example, v0.2.3)
        required: false
        type: string

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="${INPUT_VERSION}"
          if [ -z "${version}" ]; then
            latest="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName')"
            if [ -z "${latest}" ]; then
              echo "no latest release found; provide a version via workflow_dispatch input" >&2
              exit 1
            fi
            if ! [[ "${latest}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "latest release tag does not match vMAJOR.MINOR.PATCH: ${latest}" >&2
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            version="v${major}.${minor}.$((patch + 1))"
          fi
          if ! [[ "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must use vMAJOR.MINOR.PATCH format: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create or update draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
