name: Example
on:
  - pull_request

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  shell-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - run: go run mvdan.cc/sh/v3/cmd/shfmt@v3.13.1 -d scripts/*.sh

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: actionlint (workflow yml + composite action.yml inline shell)
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color
      - name: shellcheck (scripts/*.sh)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./scripts

  diff-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: comment-only diff is ignored
        run: |
          tmpdir=$(mktemp -d)
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\n# comment-only change\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=false$' "${GITHUB_OUTPUT}"

      - name: meaningful diff is detected
        run: |
          tmpdir=$(mktemp -d)
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\nnode_modules/\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=true$' "${GITHUB_OUTPUT}"

      - name: untracked file is detected as changed
        run: |
          tmpdir=$(mktemp -d)
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          printf 'node_modules/\n' > .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=true$' "${GITHUB_OUTPUT}"

  example:
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./
