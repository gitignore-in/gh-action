name: Example
on:
  - pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  required-status-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: required status checks are produced
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: scripts/check-required-status-checks.sh --repo "${GITHUB_REPOSITORY}" --pr "${PR_NUMBER}"

  shell-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - run: go run mvdan.cc/sh/v3/cmd/shfmt@v3.13.1 -d scripts/*.sh

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - name: actionlint (workflow yml + composite action.yml inline shell)
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 -color
      - name: shellcheck (scripts/*.sh)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./scripts

  diff-detection:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: comment-only diff is ignored
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\n # comment-only change\n\t# tab-indented comment-only change\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=false$' "${GITHUB_OUTPUT}"

      - name: whitespace-only diff is ignored
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\n   \n\t\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=false$' "${GITHUB_OUTPUT}"

      - name: missing final newline diff is ignored
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          printf 'node_modules/' > .gitignore
          git add .gitignore
          git commit -m init
          printf 'node_modules/\n' > .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=false$' "${GITHUB_OUTPUT}"

      - name: meaningful diff is detected
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\nnode_modules/\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=true$' "${GITHUB_OUTPUT}"

      - name: plus-minus-prefixed meaningful diff is detected
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cp .gitignore "${tmpdir}/.gitignore"
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          git add .gitignore
          git commit -m init
          printf '\n+cache/\n-build/\n' >> .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=true$' "${GITHUB_OUTPUT}"

      - name: untracked file is detected as changed
        run: |
          tmpdir=$(mktemp -d)
          trap 'rm -rf "${tmpdir}"' EXIT
          cd "${tmpdir}"
          git init
          git config user.name test
          git config user.email test@example.com
          printf 'node_modules/\n' > .gitignore
          export GITHUB_OUTPUT="${tmpdir}/output.txt"
          "${GITHUB_WORKSPACE}/scripts/has-meaningful-gitignore-diff.sh" .gitignore
          grep '^changed=true$' "${GITHUB_OUTPUT}"

  example:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: test
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./

  example-pinned-boilerplates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: test (boilerplates_ref passthrough)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./
        with:
          boilerplates_ref: main

  timeout-helper:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: timeout helper
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: runs timeout helper tests
        run: bash scripts/test-run-with-timeout.sh

      - name: stops command group when wrapper receives SIGTERM
        run: bash scripts/test-run-with-timeout-signals.sh
